org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Désactive la compilation incrémentale Kotlin : évite les erreurs
# "Could not close incremental caches" causées par le verrouillage des fichiers
# .tab sous Windows (antivirus / indexation du dossier build).
kotlin.incremental=false
# Connexion lente / instable : on laisse à Gradle beaucoup plus de temps pour
# télécharger les gros artefacts (ex. kotlin-compiler ~100 Mo) avant d'abandonner.
# Défaut = 30 s ; ici 180 s.
systemProp.org.gradle.internal.http.connectionTimeout=180000
systemProp.org.gradle.internal.http.socketTimeout=180000
